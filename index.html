<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | منصة تمويل التداول</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0f2c 0%, #0c1225 100%);
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية متحركة */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 40%, rgba(0, 224, 255, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
            z-index: -1;
        }

        .bg-animation::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.08"><path fill="none" stroke="%2300e0ff" stroke-width="0.8" d="M10 10 L90 10 M10 30 L90 30 M10 50 L90 50 M10 70 L90 70 M10 90 L90 90 M10 10 L10 90 M30 10 L30 90 M50 10 L50 90 M70 10 L70 90 M90 10 L90 90"/></svg>');
            background-repeat: repeat;
            animation: moveGrid 30s linear infinite;
        }

        @keyframes moveGrid {
            0% { transform: translate(0,0); }
            100% { transform: translate(40px,40px); }
        }

        /* الحاوية الرئيسية */
        .login-wrapper {
            width: 1200px;
            max-width: 95%;
            display: flex;
            background: rgba(15, 25, 45, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(0, 224, 255, 0.3);
            z-index: 10;
        }

        /* قسم تسجيل الدخول */
        .login-form {
            flex: 1;
            padding: 48px 40px;
            background: rgba(10, 15, 35, 0.8);
            backdrop-filter: blur(8px);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-area h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #fff, #00e0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .logo-area p {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 24px;
        }

        .input-group i {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #00e0ff;
            font-size: 1.1rem;
        }

        .input-group input {
            width: 100%;
            padding: 14px 48px 14px 20px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .input-group input:focus {
            border-color: #00e0ff;
            box-shadow: 0 0 12px rgba(0,224,255,0.3);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(0,114,255,0.4);
        }

        .btn-google {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 40px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-google:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.02);
        }

        .error-message {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid #e74c3c;
            color: #e74c3c;
            padding: 10px;
            border-radius: 28px;
            text-align: center;
            margin: 16px 0;
            font-size: 0.85rem;
        }

        .links {
            display: flex;
            justify-content: space-between;
            margin-top: 24px;
        }

        .links a {
            color: #00e0ff;
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .links a:hover {
            text-decoration: underline;
        }

        /* القسم الترويجي */
        .promo-side {
            flex: 1;
            background: linear-gradient(145deg, #0f1435, #090c22);
            padding: 48px 32px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .promo-side h2 {
            font-size: 2rem;
            margin-bottom: 24px;
            color: white;
        }

        .promo-side ul {
            list-style: none;
            margin-bottom: 32px;
        }

        .promo-side li {
            margin: 16px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #cbd5e1;
        }

        .promo-side li i {
            color: #00e0ff;
            width: 24px;
        }

        .stat-badge {
            background: rgba(0,224,255,0.1);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(0,224,255,0.3);
        }

        .stat-badge .number {
            font-size: 2rem;
            font-weight: 800;
            color: #00e0ff;
        }

        @media (max-width: 900px) {
            .promo-side { display: none; }
            .login-wrapper { max-width: 500px; }
        }
    </style>
</head>
<body>
<div class="bg-animation"></div>

<div class="login-wrapper">
    <div class="login-form">
        <div class="logo-area">
            <h1><i class="fas fa-chart-line"></i> Traders<span style="color:#00e0ff;">Fund</span></h1>
            <p>منصة التمويل الأولى للمتداولين المحترفين</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="البريد الإلكتروني" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="كلمة المرور" required>
            </div>
            <button type="submit" class="btn-primary" id="loginBtn">دخول</button>
        </form>

        <button class="btn-google" id="googleLoginBtn">
            <i class="fab fa-google"></i> تسجيل الدخول عبر Google
        </button>

        <div id="errorMessage" class="error-message"></div>

        <div class="links">
            <a href="forgot-password.html">نسيت كلمة المرور؟</a>
            <a href="register.html">إنشاء حساب جديد</a>
        </div>
    </div>

    <div class="promo-side">
        <h2>تمويل يصل إلى <span style="color:#00e0ff;">$200,000</span></h2>
        <ul>
            <li><i class="fas fa-check-circle"></i> تقييم احترافي بشفافية</li>
            <li><i class="fas fa-check-circle"></i> سحوبات فورية خلال 24 ساعة</li>
            <li><i class="fas fa-check-circle"></i> دعم فني على مدار الساعة</li>
            <li><i class="fas fa-check-circle"></i> رافعة مالية تصل 1:100</li>
        </ul>
        <div class="stat-badge">
            <div class="number">+10,000</div>
            <div>متداول مموّل</div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

    // إعدادات المشروع (نفس المستخدم في dashboard)
    const firebaseConfig = {
        apiKey: "AIzaSyANR5zRHfDn5j8u8uQUj5fg9dPRmn_ZlyI",
        authDomain: "tradingfinanceapp-9e2e2.firebaseapp.com",
        projectId: "tradingfinanceapp-9e2e2",
        storageBucket: "tradingfinanceapp-9e2e2.firebasestorage.app",
        messagingSenderId: "395030573606",
        appId: "1:395030573606:web:d226e06ed382eb723f6ce7",
        measurementId: "G-M8MR66T1RG"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const googleProvider = new GoogleAuthProvider();

    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const errorDiv = document.getElementById('errorMessage');
    const loginBtn = document.getElementById('loginBtn');
    const googleBtn = document.getElementById('googleLoginBtn');

    // تسجيل الدخول بالبريد وكلمة المرور
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        errorDiv.innerText = "";

        if (!email || !password) {
            errorDiv.innerText = "❌ الرجاء إدخال البريد الإلكتروني وكلمة المرور";
            return;
        }

        loginBtn.disabled = true;
        loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الدخول...';

        try {
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            console.log("تم تسجيل الدخول:", userCredential.user.email);
            // ✅ توجيه إلى لوحة التحكم
            window.location.href = "dashboard.html";
        } catch (error) {
            let msg = "";
            switch (error.code) {
                case 'auth/user-not-found':
                    msg = "❌ لا يوجد حساب بهذا البريد الإلكتروني";
                    break;
                case 'auth/wrong-password':
                    msg = "❌ كلمة المرور غير صحيحة";
                    break;
                case 'auth/invalid-email':
                    msg = "❌ البريد الإلكتروني غير صالح";
                    break;
                default:
                    msg = "❌ خطأ: " + error.message;
            }
            errorDiv.innerText = msg;
        } finally {
            loginBtn.disabled = false;
            loginBtn.innerHTML = 'دخول';
        }
    });

    // تسجيل الدخول عبر Google
    googleBtn.addEventListener('click', async () => {
        errorDiv.innerText = "";
        googleBtn.disabled = true;
        googleBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الاتصال بـ Google...';
        try {
            const result = await signInWithPopup(auth, googleProvider);
            console.log("Google login success:", result.user);
            window.location.href = "dashboard.html";
        } catch (error) {
            errorDiv.innerText = "❌ فشل تسجيل الدخول عبر Google: " + error.message;
        } finally {
            googleBtn.disabled = false;
            googleBtn.innerHTML = '<i class="fab fa-google"></i> تسجيل الدخول عبر Google';
        }
    });
</script>
</body>
</html>
