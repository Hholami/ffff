<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الملف الشخصي - FundedX</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #f0f4ff, #e9eefa);
      min-height: 100vh;
      padding: 1.5rem;
    }
    .profile-container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border-radius: 2rem;
      box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .profile-header {
      background: linear-gradient(135deg, #1e2a3a, #0f172a);
      padding: 2rem;
      text-align: center;
      color: white;
    }
    .profile-header h1 { font-size: 1.9rem; margin-bottom: 0.5rem; }
    .profile-form { padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem; }
    .form-card {
      background: white;
      border-radius: 1.5rem;
      border: 1px solid #eef2f6;
      box-shadow: 0 5px 15px rgba(0,0,0,0.02);
    }
    .card-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #edf2f7;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .card-header i { font-size: 1.5rem; color: #2563eb; }
    .card-header h3 { font-size: 1.25rem; font-weight: 600; }
    .card-body { padding: 1.5rem; }
    .form-row { display: flex; gap: 1rem; margin-bottom: 1.2rem; flex-wrap: wrap; }
    .form-group { flex: 1; min-width: 180px; }
    .form-group label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: #334155;
      margin-bottom: 0.4rem;
    }
    .form-group label i { color: #3b82f6; }
    input, select {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 0.75rem;
      font-family: inherit;
      background: #fafcff;
      transition: 0.2s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    }
    .phone-wrapper {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .country-code {
      width: 110px;
      padding: 0.75rem 0.5rem;
    }
    .phone-number {
      flex: 1;
    }
    .btn-save {
      background: linear-gradient(95deg, #2563eb, #1e40af);
      border: none;
      color: white;
      padding: 0.9rem 2rem;
      border-radius: 3rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      transition: 0.25s;
    }
    .btn-save:hover { transform: translateY(-2px); }
    .form-actions { text-align: center; }
    .message {
      margin-top: 1rem;
      padding: 0.8rem;
      border-radius: 1rem;
      font-weight: 500;
      text-align: center;
    }
    .message.success { background: #dcfce7; color: #166534; }
    .message.error { background: #fee2e2; color: #991b1b; }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #f1f5f9;
      color: #1e293b;
      padding: 0.6rem 1.5rem;
      border-radius: 2rem;
      text-decoration: none;
      font-size: 0.85rem;
      margin: 1rem 2rem 0 2rem;
    }
    @media (max-width: 700px) {
      .profile-form { padding: 1.2rem; }
      .form-row { flex-direction: column; gap: 0.8rem; }
    }
  </style>
</head>
<body>

<div class="profile-container">
  <div class="profile-header">
    <h1 id="greetingName">مرحباً، المتداول</h1>
    <p>إدارة ملفك الشخصي وبيانات التداول</p>
  </div>
  <div style="padding: 0 2rem; text-align: left;">
    <a href="dashboard.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة إلى لوحة التحكم</a>
  </div>

  <form id="profileForm" class="profile-form">
    <div class="form-card">
      <div class="card-header"><i class="fas fa-user-circle"></i><h3>المعلومات الشخصية</h3></div>
      <div class="card-body">
        <div class="form-row">
          <div class="form-group"><label><i class="fas fa-user"></i> الاسم الأول</label><input type="text" id="firstName" placeholder="أدخل اسمك الأول"></div>
          <div class="form-group"><label><i class="fas fa-user-tag"></i> اللقب</label><input type="text" id="lastName" placeholder="أدخل لقبك"></div>
        </div>
        <div class="form-group"><label><i class="fas fa-at"></i> اسم المستخدم</label><input type="text" id="username" placeholder="@username"></div>
        <div class="form-group">
          <label><i class="fas fa-phone-alt"></i> رقم الهاتف</label>
          <div class="phone-wrapper">
            <select id="countryCode" class="country-code">
              <option value="+213">🇩🇿 +213 (الجزائر)</option>
              <option value="+20">🇪🇬 +20 (مصر)</option>
              <option value="+966">🇸🇦 +966 (السعودية)</option>
              <option value="+971">🇦🇪 +971 (الإمارات)</option>
              <option value="+961">🇱🇧 +961 (لبنان)</option>
              <option value="+962">🇯🇴 +962 (الأردن)</option>
              <option value="+965">🇰🇼 +965 (الكويت)</option>
              <option value="+974">🇶🇦 +974 (قطر)</option>
              <option value="+1">🇺🇸 +1 (الولايات المتحدة)</option>
              <option value="+44">🇬🇧 +44 (بريطانيا)</option>
            </select>
            <input type="tel" id="phoneNumber" class="phone-number" placeholder="رقم الهاتف">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label><i class="fas fa-flag"></i> الدولة</label><input type="text" id="country" placeholder="الدولة"></div>
          <div class="form-group"><label><i class="fas fa-city"></i> الولاية/المدينة</label><input type="text" id="state" placeholder="الولاية أو المدينة"></div>
        </div>
        <div class="form-group"><label><i class="fas fa-map-marker-alt"></i> العنوان التفصيلي</label><input type="text" id="address" placeholder="العنوان الكامل"></div>
      </div>
    </div>

    <div class="form-card">
      <div class="card-header"><i class="fas fa-chart-line"></i><h3>بيانات التداول</h3></div>
      <div class="card-body">
        <div class="form-row">
          <div class="form-group"><label><i class="fas fa-graduation-cap"></i> مستوى الخبرة</label><select id="experience"><option value="">اختر المستوى</option><option value="مبتدئ">مبتدئ</option><option value="متوسط">متوسط</option><option value="محترف">محترف</option></select></div>
          <div class="form-group"><label><i class="fas fa-wallet"></i> نوع الحساب</label><select id="accountType"><option value="تجريبي">حساب تجريبي</option><option value="ممول">حساب ممول</option></select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label><i class="fas fa-coins"></i> رأس المال الأولي ($)</label><input type="number" id="initialCapital" step="1000" placeholder="مثال: 10000"></div>
          <div class="form-group"><label><i class="fas fa-chart-simple"></i> الخسائر القصوى ($)</label><input type="number" id="maxDrawdown" step="100" placeholder="مثال: 3000"></div>
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-save"><i class="fas fa-save"></i> حفظ التغييرات</button>
      <div id="message" class="message"></div>
    </div>
  </form>
</div>

<script type="module">
  // ========== إعدادات Firebase ==========
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

  // 🔥 تأكد من أن هذه البيانات صحيحة 100% (انسخها من Firebase Console)
  const firebaseConfig = {
        apiKey: "AIzaSyANR5zRHfDn5j8u8uQUj5fg9dPRmn_ZlyI",
        authDomain: "tradingfinanceapp-9e2e2.firebaseapp.com",
        projectId: "tradingfinanceapp-9e2e2",
        storageBucket: "tradingfinanceapp-9e2e2.firebasestorage.app",
        messagingSenderId: "395030573606",
        appId: "1:395030573606:web:d226e06ed382eb723f6ce7",
        measurementId: "G-M8MR66T1RG"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // عناصر الصفحة
  const greetingName = document.getElementById('greetingName');
  const firstNameEl = document.getElementById('firstName');
  const lastNameEl = document.getElementById('lastName');
  const usernameEl = document.getElementById('username');
  const countryCodeEl = document.getElementById('countryCode');
  const phoneNumberEl = document.getElementById('phoneNumber');
  const countryEl = document.getElementById('country');
  const stateEl = document.getElementById('state');
  const addressEl = document.getElementById('address');
  const experienceEl = document.getElementById('experience');
  const accountTypeEl = document.getElementById('accountType');
  const initialCapitalEl = document.getElementById('initialCapital');
  const maxDrawdownEl = document.getElementById('maxDrawdown');
  const messageDiv = document.getElementById('message');
  const profileForm = document.getElementById('profileForm');

  let currentUser = null;

  function showMessage(msg, type) {
    messageDiv.textContent = msg;
    messageDiv.className = `message ${type}`;
    setTimeout(() => {
      messageDiv.textContent = '';
      messageDiv.className = 'message';
    }, 4000);
  }

  // دالة تجميع الهاتف
  function getFullPhone() {
    const code = countryCodeEl.value;
    const number = phoneNumberEl.value.trim();
    if (!number) return '';
    return `${code} ${number}`;
  }

  // دالة تفكيك الهاتف عند التحميل
  function setPhoneFields(fullPhone) {
    if (!fullPhone) return;
    const parts = fullPhone.split(' ');
    if (parts.length >= 2) {
      const possibleCode = parts[0];
      let found = false;
      for (let i = 0; i < countryCodeEl.options.length; i++) {
        if (countryCodeEl.options[i].value === possibleCode) {
          countryCodeEl.value = possibleCode;
          found = true;
          break;
        }
      }
      if (!found) countryCodeEl.value = "+213";
      phoneNumberEl.value = parts.slice(1).join(' ');
    } else {
      phoneNumberEl.value = fullPhone;
    }
  }

  // حفظ البيانات في Firestore
  async function saveProfileData(userId, data) {
    try {
      const userRef = doc(db, 'users', userId);
      await setDoc(userRef, { ...data, updatedAt: serverTimestamp() }, { merge: true });
      showMessage('✅ تم حفظ الملف الشخصي بنجاح!', 'success');
      return true;
    } catch (error) {
      console.error("Firestore save error:", error);
      showMessage('❌ فشل الحفظ: ' + error.message, 'error');
      return false;
    }
  }

  // تحميل البيانات من Firestore وملء الحقول
  async function loadProfileData(userId) {
    try {
      const userRef = doc(db, 'users', userId);
      const docSnap = await getDoc(userRef);
      if (docSnap.exists()) {
        const data = docSnap.data();
        firstNameEl.value = data.firstName || '';
        lastNameEl.value = data.lastName || '';
        usernameEl.value = data.username || '';
        if (data.phone) setPhoneFields(data.phone);
        countryEl.value = data.country || '';
        stateEl.value = data.state || '';
        addressEl.value = data.address || '';
        experienceEl.value = data.experience || '';
        accountTypeEl.value = data.accountType || 'تجريبي';
        initialCapitalEl.value = data.initialCapital || '';
        maxDrawdownEl.value = data.maxDrawdown || '';
        console.log("✅ تم تحميل البيانات بنجاح");
      } else {
        console.log("لا توجد بيانات سابقة لهذا المستخدم");
      }
    } catch (error) {
      console.error("Firestore load error:", error);
      showMessage('❌ خطأ في تحميل البيانات: ' + error.message, 'error');
    }
  }

  // عند إرسال النموذج
  profileForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!currentUser) {
      showMessage('❌ الرجاء تسجيل الدخول أولاً', 'error');
      return;
    }

    const formData = {
      firstName: firstNameEl.value,
      lastName: lastNameEl.value,
      username: usernameEl.value,
      phone: getFullPhone(),
      country: countryEl.value,
      state: stateEl.value,
      address: addressEl.value,
      experience: experienceEl.value,
      accountType: accountTypeEl.value,
      initialCapital: initialCapitalEl.value ? Number(initialCapitalEl.value) : 0,
      maxDrawdown: maxDrawdownEl.value ? Number(maxDrawdownEl.value) : 0
    };

    await saveProfileData(currentUser.uid, formData);
  });

  // مراقبة حالة تسجيل الدخول
  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = 'index.html';
      return;
    }
    currentUser = user;
    // عرض الاسم من Firebase Auth
    let displayName = user.displayName;
    if (!displayName) displayName = user.email ? user.email.split('@')[0] : 'المتداول';
    greetingName.innerHTML = `مرحباً، ${displayName}`;
    
    // تحميل البيانات المحفوظة
    await loadProfileData(user.uid);
  });
</script>
</body>
</html>
