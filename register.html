<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد - منصة التمويل</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="animated-bg"></div>
    
    <div class="main-container">
        <div class="login-section">
            <div class="glass-card">
                <div class="logo-area">
                    <img src="https://via.placeholder.com/60?text=TRADE" alt="Logo" class="logo">
                    <h1>Traders<span>Fund</span></h1>
                    <p>إنشاء حساب جديد للتمويل</p>
                </div>

                <form id="registerForm">
                    <div class="input-field">
                        <i class="fas fa-user"></i>
                        <input type="text" id="fullName" placeholder="الاسم الكامل" required>
                    </div>
                    <div class="input-field">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="البريد الإلكتروني" required>
                    </div>
                    <div class="input-field">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="كلمة المرور" required>
                    </div>
                    <div class="input-field">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirmPassword" placeholder="تأكيد كلمة المرور" required>
                    </div>
                    <button type="submit" id="submitBtn" class="btn-primary">
                        <i class="fas fa-user-plus"></i> إنشاء حساب
                    </button>
                </form>

                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>

                <div class="links">
                    <a href="index.html">← عودة إلى تسجيل الدخول</a>
                </div>
            </div>
        </div>

        <div class="info-section">
            <div class="stats">
                <div class="stat-item">
                    <h3>+10,000</h3>
                    <p>متداول مموّل</p>
                </div>
                <div class="stat-item">
                    <h3>$150M</h3>
                    <p>إجمالي الأرباح</p>
                </div>
            </div>
            <div class="features">
                <h2>ماذا تحصل عند التسجيل؟</h2>
                <ul>
                    <li><i class="fas fa-check-circle"></i> حساب تجريبي $100,000</li>
                    <li><i class="fas fa-check-circle"></i> خصم 20% على أول تمويل</li>
                    <li><i class="fas fa-check-circle"></i> خطة تدريب مجانية</li>
                </ul>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        // 🔥 إعدادات المشروع الجديد
        const firebaseConfig = {
            apiKey: "AIzaSyANR5zRHfDn5j8u8uQUj5fg9dPRmn_ZlyI",
            authDomain: "tradingfinanceapp-9e2e2.firebaseapp.com",
            projectId: "tradingfinanceapp-9e2e2",
            storageBucket: "tradingfinanceapp-9e2e2.firebasestorage.app",
            messagingSenderId: "395030573606",
            appId: "1:395030573606:web:d226e06ed382eb723f6ce7",
            measurementId: "G-M8MR66T1RG"
        };

        // تهيئة Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const form = document.getElementById('registerForm');
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            errorDiv.innerText = "";
            successDiv.innerText = "";
            
            // التحقق من صحة البيانات
            if (!fullName || !email || !password) {
                errorDiv.innerText = "❌ الرجاء ملء جميع الحقول";
                return;
            }
            
            if (password !== confirmPassword) {
                errorDiv.innerText = "❌ كلمة المرور غير متطابقة";
                return;
            }
            
            if (password.length < 6) {
                errorDiv.innerText = "❌ كلمة المرور يجب أن تكون 6 أحرف على الأقل";
                return;
            }
            
            // تعطيل الزر
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري إنشاء الحساب...';
            
            try {
                // 1. إنشاء حساب في Authentication
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // 2. تحديث الاسم
                await updateProfile(user, { displayName: fullName });
                
                // 3. حفظ البيانات في Firestore
                await setDoc(doc(db, "users", user.uid), {
                    fullName: fullName,
                    email: email,
                    createdAt: new Date(),
                    virtualBalance: 100000,
                    tradingChallenge: "not_started"
                });
                
                // 4. عرض رسالة نجاح
                successDiv.innerText = "✅ تم إنشاء الحساب بنجاح! جاري التحويل...";
                
                // 5. الانتقال إلى صفحة تسجيل الدخول بعد 1 ثانية
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 1000);
                
            } catch (error) {
                console.error("خطأ:", error);
                let msg = error.message;
                if (error.code === 'auth/email-already-in-use') {
                    msg = "هذا البريد الإلكتروني مسجل بالفعل";
                } else if (error.code === 'auth/invalid-email') {
                    msg = "البريد الإلكتروني غير صالح";
                } else if (error.code === 'auth/weak-password') {
                    msg = "كلمة المرور ضعيفة جداً (استخدم 6 أحرف على الأقل)";
                }
                errorDiv.innerText = "❌ " + msg;
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> إنشاء حساب';
            }
        });
    </script>
</body>
</html>
