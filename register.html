<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد - منصة التمويل</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="animated-bg"></div>
    
    <div class="main-container">
        <div class="login-section">
            <div class="glass-card">
                <div class="logo-area">
                    <img src="https://via.placeholder.com/60?text=TRADE" alt="Logo" class="logo">
                    <h1>Traders<span>Fund</span></h1>
                    <p>إنشاء حساب جديد للتمويل</p>
                </div>

                <form id="registerForm">
                    <div class="input-field">
                        <i class="fas fa-user"></i>
                        <input type="text" id="fullName" placeholder="الاسم الكامل" required>
                    </div>
                    <div class="input-field">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="البريد الإلكتروني" required>
                    </div>
                    <div class="input-field">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="كلمة المرور" required>
                    </div>
                    <div class="input-field">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirmPassword" placeholder="تأكيد كلمة المرور" required>
                    </div>
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-user-plus"></i> إنشاء حساب
                    </button>
                </form>

                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>

                <div class="links">
                    <a href="index.html">← عودة إلى تسجيل الدخول</a>
                </div>
            </div>
        </div>

        <div class="info-section">
            <div class="stats">
                <div class="stat-item">
                    <h3>+10,000</h3>
                    <p>متداول مموّل</p>
                </div>
                <div class="stat-item">
                    <h3>$150M</h3>
                    <p>إجمالي الأرباح</p>
                </div>
            </div>
            <div class="features">
                <h2>ماذا تحصل عند التسجيل؟</h2>
                <ul>
                    <li><i class="fas fa-check-circle"></i> حساب تجريبي $100,000</li>
                    <li><i class="fas fa-check-circle"></i> خصم 20% على أول تمويل</li>
                    <li><i class="fas fa-check-circle"></i> خطة تدريب مجانية</li>
                </ul>
            </div>
        </div>
    </div>

    <script type="module" src="register.js"></script>
</body>
</html>
