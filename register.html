<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="animated-bg"></div>
    
    <div class="main-container">
        <div class="login-section">
            <div class="glass-card">
                <div class="logo-area">
                    <h1>Traders<span>Fund</span></h1>
                    <p>إنشاء حساب جديد</p>
                </div>

                <form id="registerForm">
                    <div class="input-field">
                        <i class="fas fa-user"></i>
                        <input type="text" id="fullName" placeholder="الاسم الكامل" required>
                    </div>
                    <div class="input-field">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="البريد الإلكتروني" required>
                    </div>
                    <div class="input-field">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="كلمة المرور" required>
                    </div>
                    <div class="input-field">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirmPassword" placeholder="تأكيد كلمة المرور" required>
                    </div>
                    <button type="submit" id="submitBtn" class="btn-primary">
                        إنشاء حساب
                    </button>
                </form>

                <div id="errorMessage" class="error-message" style="color: red; margin-top: 10px;"></div>
                <div class="links">
                    <a href="index.html">← عودة إلى تسجيل الدخول</a>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDIGQ8MTdb3XzJ8w4CuktSADkLF9MUZIYI",
            authDomain: "tradingfinanceapp.firebaseapp.com",
            projectId: "tradingfinanceapp",
            storageBucket: "tradingfinanceapp.firebasestorage.app",
            messagingSenderId: "901228416943",
            appId: "1:901228416943:web:013b973250d7b4fa4ce95a",
            measurementId: "G-59C97Y8TB5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const form = document.getElementById('registerForm');
        const errorDiv = document.getElementById('errorMessage');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            errorDiv.innerText = "";
            
            // التحقق من صحة البيانات
            if (!fullName || !email || !password) {
                errorDiv.innerText = "❌ الرجاء ملء جميع الحقول";
                return;
            }
            
            if (password !== confirmPassword) {
                errorDiv.innerText = "❌ كلمة المرور غير متطابقة";
                return;
            }
            
            if (password.length < 6) {
                errorDiv.innerText = "❌ كلمة المرور يجب أن تكون 6 أحرف على الأقل";
                return;
            }
            
            // تعطيل الزر وتغيير نصه
            submitBtn.disabled = true;
            submitBtn.innerHTML = 'جاري إنشاء الحساب...';
            
            try {
                // 1. إنشاء الحساب في Auth
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // 2. حفظ البيانات في Firestore
                await setDoc(doc(db, "users", user.uid), {
                    fullName: fullName,
                    email: email,
                    createdAt: new Date(),
                    virtualBalance: 100000
                });
                
                // 3. الانتقال إلى صفحة تسجيل الدخول
                // استخدام replace بدلاً من href لمنع الرجوع للخلف
                window.location.replace("index.html");
                
            } catch (error) {
                console.error("خطأ كامل:", error);
                errorDiv.innerText = "❌ خطأ: " + error.message;
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'إنشاء حساب';
            }
        });
    </script>
</body>
</html>
